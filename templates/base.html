<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Dynamic Title -->
    <title>{% block title %}MedPredict{% endblock %}</title>

    <!-- Global CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">

    <!-- Page Specific CSS -->
    {% block css %}{% endblock %}
</head>

<body>

    <div class="app">

        <!-- HEADER -->
        {% include 'header.html' %}

        <!-- MAIN CONTENT -->
        {% block content %}{% endblock %}

        <!-- FOOTER -->
        {% include 'footer.html' %}

    </div>

    <!-- Page Scripts -->
    {% block script %}{% endblock %}

</body>
</html>
